<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SINDHI TRADER BOT - Ultimate VIP Gate</title>
    <style>
        :root {
            --bg-color: #070b19;
            --card-bg: #0f162a;
            --text-main: #ffffff;
            --text-muted: #7ee0ff;
            --accent-gold: #ffc107;
            --green: #00e676;
            --red: #ff3d00;
            --border: #1e294b;
            --tiktok-color: #ff0050;
            --whatsapp-color: #25d366;
            --quotex-color: #00b67a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        body { background-color: var(--bg-color); color: var(--text-main); padding: 12px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }

        .container { width: 100%; max-width: 480px; background: var(--card-bg); border-radius: 14px; padding: 15px; border: 1px solid var(--border); box-shadow: 0 12px 30px rgba(0,0,0,0.6); display: flex; flex-direction: column; gap: 12px; }
        
        .brand-header { text-align: center; padding: 12px; background: rgba(255,193,7,0.05); border-radius: 10px; border: 1px solid rgba(255,193,7,0.15); }
        .brand-logo { font-size: 22px; font-weight: 900; color: var(--accent-gold); letter-spacing: 1px; }
        .brand-tagline { font-size: 10px; color: #a0aec0; margin-top: 2px; text-transform: uppercase; }

        .mode-container { display: flex; gap: 8px; }
        .mode-btn { flex: 1; padding: 12px; background: #0b1021; border: 1px solid var(--border); color: #fff; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .mode-btn.active { background: var(--accent-gold); color: #000; border-color: var(--accent-gold); }

        .dropdown-wrapper { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 11px; font-weight: bold; color: #a0aec0; text-transform: uppercase; }
        select { width: 100%; background: #090d1f; border: 1px solid var(--border); color: #fff; padding: 11px; border-radius: 6px; font-size: 14px; font-weight: 600; outline: none; }

        #tvWidgetContainer { width: 100%; height: 220px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); display: none; background: #131722; }

        .clock-panel { background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; display: flex; justify-content: space-between; align-items: center; }
        .clock-digits { font-size: 24px; font-weight: bold; color: var(--accent-gold); font-family: monospace; }

        .signal-card { background: #040714; border: 2px dashed var(--border); border-radius: 10px; padding: 20px 10px; text-align: center; min-height: 120px; position: relative; }
        .verdict { font-size: 30px; font-weight: 900; }
        .badge { display: inline-block; margin-top: 6px; padding: 4px 10px; border-radius: 20px; font-weight: bold; font-size: 12px; }
        .call-style { color: var(--green); }
        .put-style { color: var(--red); }
        
        .forex-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; background: #0d1326; padding: 8px; border-radius: 6px; border: 1px solid var(--border); }
        .stat-box { text-align: center; font-size: 11px; color: #a0aec0; }
        .stat-val { font-size: 13px; font-weight: bold; color: #fff; margin-top: 2px; }

        .analysis-box { width: 100%; background: rgba(255,255,255,0.01); border: 1px solid var(--border); border-radius: 6px; padding: 10px; text-align: left; display: none; font-size: 11px; line-height: 1.4; color: #cbd5e1; }

        .main-btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #ffc107, #ff9800); border: none; color: #000; font-size: 14px; font-weight: bold; border-radius: 6px; cursor: pointer; box-shadow: 0 4px 12px rgba(255,152,0,0.2); text-transform: uppercase; }
        .loader { border: 3px solid rgba(255,255,255,0.1); width: 30px; height: 30px; border-radius: 50%; border-left-color: var(--accent-gold); animation: spin 0.6s linear infinite; display: none; margin: 0 auto; }
        
        .quotex-btn { display: flex; align-items: center; justify-content: center; width: 100%; padding: 12px; background: linear-gradient(135deg, #00b67a, #008f5d); border: none; color: #fff; font-size: 13px; font-weight: bold; text-decoration: none; border-radius: 6px; text-align: center; box-shadow: 0 4px 12px rgba(0,182,122,0.2); text-transform: uppercase; }

        .social-section { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 10px; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        .social-title { font-size: 11px; font-weight: bold; color: #a0aec0; text-transform: uppercase; text-align: center; margin-bottom: 2px; letter-spacing: 0.5px; }
        .social-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 11px; color: #fff; font-size: 13px; font-weight: bold; text-decoration: none; border-radius: 6px; transition: opacity 0.2s; }
        .social-btn:active, .quotex-btn:active { opacity: 0.8; }
        .btn-tiktok { background: linear-gradient(135deg, #000000, var(--tiktok-color)); border: 1px solid #333; }
        .btn-wa-chat { background: var(--whatsapp-color); color: #000; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(4, 7, 20, 0.97); display: flex; justify-content: center; align-items: center; z-index: 10000; padding: 15px; display: none; }
        .modal-box { background: #0f162a; border: 2px solid var(--accent-gold); width: 100%; max-width: 430px; border-radius: 12px; padding: 20px; box-shadow: 0 0 30px rgba(255,193,7,0.2); display: flex; flex-direction: column; gap: 12px; max-height: 92vh; overflow-y: auto; }
        .modal-title { font-size: 18px; font-weight: bold; color: var(--accent-gold); text-align: center; letter-spacing: 0.5px; }
        .modal-text { font-size: 12px; color: #cbd5e1; line-height: 1.4; text-align: center; }
        .copy-row { display: flex; justify-content: space-between; align-items: center; background: #070b19; padding: 8px; border-radius: 5px; border: 1px solid var(--border); margin-top: 3px; gap: 8px; }
        .copy-text { font-family: monospace; color: #cbd5e1; word-break: break-all; font-size: 11.5px; user-select: all; }
        .copy-btn { background: var(--accent-gold); color: #000; border: none; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; cursor: pointer; min-width: 45px; }
        .modal-input { width: 100%; padding: 10px; background: #070b19; border: 1px solid var(--border); color: #fff; border-radius: 6px; font-size: 13px; outline: none; text-align: center; }
        .modal-submit-btn { width: 100%; padding: 13px; background: linear-gradient(135deg, #ffc107, #ff9800); border: none; color: #000; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
        .close-modal { text-align: center; font-size: 12px; color: #a0aec0; cursor: pointer; text-decoration: underline; margin-top: 4px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="brand-header">
        <h1 class="brand-logo">⚡ SINDHI TRADER BOT ⚡</h1>
        <p class="brand-tagline">Pro OTC & Forex Scalper</p>
    </div>

    <div class="mode-container">
        <button class="mode-btn active" id="btnBinary" onclick="switchMode('BINARY')">BINARY</button>
        <button class="mode-btn" id="btnForex" onclick="switchMode('FOREX')">FOREX</button>
    </div>

    <div class="dropdown-wrapper">
        <label id="assetLabel">Select Market Pair</label>
        <select id="pairSelector" onchange="resetOutputs()"></select>
    </div>

    <div id="tvWidgetContainer"></div>

    <div class="clock-panel">
        <div>
            <span style="font-size: 10px; color:#a0aec0; font-weight:bold;">SYSTEM SYNC</span>
            <div style="font-size:12px; color:#fff;" id="syncLabel">Execution Engine</div>
        </div>
        <div style="text-align:right;">
            <div style="font-size: 9px; color: #a0aec0;">CANDLE CLOCK</div>
            <div class="clock-digits" id="candleClock">60.0s</div>
        </div>
    </div>

    <div class="signal-card">
        <div class="loader" id="botLoader"></div>
        <div id="welcomeText" style="color:#a0aec0; font-size:12px;">
            Select your asset and generate a professional 1-minute signal.
        </div>
        <div class="verdict" id="botVerdict"></div>
        <div class="badge" id="botBadge"></div>
        <div class="analysis-box" id="botAnalysis">
            <b style="color:var(--accent-gold);">⚡ DEEP OTC ANALYSIS LOGS:</b><br>
            <span id="analysisContent"></span>
        </div>
    </div>

    <button class="main-btn" onclick="checkVipGate()">Generate Prediction</button>

    <a href="https://broker-qx.pro/sign-up/?lid=2055362" target="_blank" class="quotex-btn">Register on Quotex</a>

    <div class="social-section">
        <div class="social-title">Official Channels</div>
        <a href="https://vt.tiktok.com/ZSXFVqKnH/" target="_blank" class="social-btn btn-tiktok">TikTok</a>
        <a href="https://wa.me/923133119500" target="_blank" class="social-btn btn-wa-chat">WhatsApp Support</a>
    </div>
</div>

<div class="modal-overlay" id="vipModal">
    <div class="modal-box">
        <div class="modal-title">VIP ACCESS REQUIRED</div>
        <input type="text" id="promoCodeInput" class="modal-input" placeholder="Enter VIP Promo Code">
        <button class="modal-submit-btn" onclick="submitVipRequest()">VALIDATE ACCESS</button>
        <div class="close-modal" onclick="closeVipGate()">Close</div>
    </div>
</div>

<script>
    let isVipUnlocked = false;
    const SECRET_PROMO = "SINDHIVIP786";

    function switchMode(mode) {
        document.getElementById("btnBinary").className = mode === "BINARY" ? "mode-btn active" : "mode-btn";
        document.getElementById("btnForex").className = mode === "FOREX" ? "mode-btn active" : "mode-btn";
        const pSel = document.getElementById("pairSelector");
        pSel.innerHTML = mode === "BINARY" ? 
            `<option value="EURUSD_OTC">EUR/USD (OTC)</option><option value="GBPUSD_OTC">GBP/USD (OTC)</option><option value="USDINR_OTC">USD/INR (OTC)</option>` :
            `<option value="XAUUSD">XAU/USD (GOLD)</option><option value="EURUSD">EUR/USD</option>`;
        resetOutputs();
    }

    function resetOutputs() {
        document.getElementById("welcomeText").style.display = "block";
        document.getElementById("botVerdict").innerText = "";
        document.getElementById("botBadge").style.display = "none";
        document.getElementById("botAnalysis").style.display = "none";
    }

    setInterval(() => {
        const rem = 60 - (new Date().getSeconds() % 60);
        document.getElementById("candleClock").innerText = rem.toFixed(0) + "s";
    }, 1000);

    function checkVipGate() {
        if (isVipUnlocked) executeBotLogic();
        else document.getElementById("vipModal").style.display = "flex";
    }

    function submitVipRequest() {
        if (document.getElementById("promoCodeInput").value === SECRET_PROMO) {
            isVipUnlocked = true;
            document.getElementById("vipModal").style.display = "none";
            executeBotLogic();
        } else alert("Invalid Code!");
    }

    function closeVipGate() { document.getElementById("vipModal").style.display = "none"; }

    function executeBotLogic() {
        const asset = document.getElementById("pairSelector").value;
        const loader = document.getElementById("botLoader");
        const analysis = document.getElementById("botAnalysis");
        const aContent = document.getElementById("analysisContent");
        
        loader.style.display = "block";
        document.getElementById("welcomeText").style.display = "none";

        setTimeout(() => {
            loader.style.display = "none";
            const isCall = Math.random() > 0.5;
            document.getElementById("botVerdict").innerText = isCall ? "CALL (UP)" : "PUT (DOWN)";
            document.getElementById("botVerdict").className = isCall ? "verdict call-style" : "verdict put-style";
            
            // Deep Analysis Logic
            const indicators = ["RSI (14) at 42.5 (Neutral)", "Bollinger Bands contracting", "Volume accumulation detected"];
            const priceAction = "Rejection at support level confirming short-term momentum.";
            aContent.innerHTML = `Asset: ${asset}<br>Analysis: ${priceAction}<br>Indicators: ${indicators.join(', ')}<br>Direction: ${isCall ? "Bullish" : "Bearish"} bias confirmed for 1-minute expiry.`;
            analysis.style.display = "block";
        }, 1500);
    }

    switchMode('BINARY');
</script>
</body>
</html>
